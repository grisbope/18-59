name: Deploy 18:59 to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-1859-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            export REPO_URL="https://github.com/grisbope/18-59.git"
            if [ -n "${{ secrets.GH_REPO_TOKEN }}" ]; then
              export REPO_URL="https://${{ secrets.GH_REPO_TOKEN }}@github.com/grisbope/18-59.git"
            fi
            if [ ! -x /opt/apps/18-59/deploy/deploy.sh ]; then
              mkdir -p /opt/apps/18-59
              if [ ! -d /opt/apps/18-59/.git ]; then
                git clone --depth 1 --branch main "$REPO_URL" /opt/apps/18-59
              fi
            fi
            cd /opt/apps/18-59
            git remote set-url origin "$REPO_URL"
            git fetch --depth 1 origin main
            git checkout -B main origin/main
            git reset --hard origin/main
            chmod +x deploy/deploy.sh
            bash deploy/deploy.sh
